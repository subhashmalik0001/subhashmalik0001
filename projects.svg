<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="pBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="pBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <clipPath id="pClip"><rect width="800" height="260" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#pClip)">
    <rect width="800" height="260" fill="url(#pBg)" rx="12"/>
    <rect width="799" height="259" rx="12" fill="none" stroke="url(#pBorder)" stroke-width="1" x="0.5" y="0.5"/>
    <rect x="0" y="0" width="3" height="260" fill="#22c55e"/>

    <!-- Header -->
    <text x="28" y="36" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">FEATURED PROJECTS</text>
    <rect x="28" y="46" width="30" height="1.5" rx="0.75" fill="#22c55e" opacity="0.6"/>

    <!-- Card 1: Thrift Store -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
      <rect x="28" y="60" width="178" height="180" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <rect x="28" y="60" width="178" height="2.5" rx="1" fill="#e85d4a"/>
      <!-- Status dot -->
      <circle cx="185" cy="80" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
      <text x="42" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#e85d4a">STARTUP</text>
      <text x="42" y="106" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Thrift Store</text>
      <text x="42" y="124" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Sustainable fashion</text>
      <text x="42" y="138" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">e-commerce platform</text>
      <!-- Tags -->
      <rect x="42" y="152" width="38" height="16" rx="3" fill="#1a1a2e"/>
      <text x="61" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#f97066">MERN</text>
      <rect x="84" y="152" width="48" height="16" rx="3" fill="#1a1a2e"/>
      <text x="108" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#fbbf24">Firebase</text>
      <rect x="136" y="152" width="42" height="16" rx="3" fill="#1a1a2e"/>
      <text x="157" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#22c55e">Stripe</text>
    </g>

    <!-- Card 2: AI EdTech -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
      <rect x="220" y="60" width="178" height="180" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <rect x="220" y="60" width="178" height="2.5" rx="1" fill="#a78bfa"/>
      <circle cx="377" cy="80" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/></circle>
      <text x="234" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#a78bfa">AI / EDTECH</text>
      <text x="234" y="106" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">AI EdTech</text>
      <text x="234" y="124" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">AI-powered learning</text>
      <text x="234" y="138" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">with adaptive paths</text>
      <rect x="234" y="152" width="40" height="16" rx="3" fill="#1a1a2e"/>
      <text x="254" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#60a5fa">React</text>
      <rect x="278" y="152" width="38" height="16" rx="3" fill="#1a1a2e"/>
      <text x="297" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#22c55e">Node</text>
      <rect x="320" y="152" width="50" height="16" rx="3" fill="#1a1a2e"/>
      <text x="345" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#a78bfa">Gemini</text>
    </g>

    <!-- Card 3: DApp Agent -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.7s" fill="freeze"/>
      <rect x="412" y="60" width="178" height="180" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <rect x="412" y="60" width="178" height="2.5" rx="1" fill="#f59e0b"/>
      <circle cx="569" cy="80" r="3" fill="#f59e0b"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
      <text x="426" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#f59e0b">WEB3 / AI</text>
      <text x="426" y="106" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">AI DApp Agent</text>
      <text x="426" y="124" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Automated DeFi smart</text>
      <text x="426" y="138" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">contract creation</text>
      <rect x="426" y="152" width="38" height="16" rx="3" fill="#1a1a2e"/>
      <text x="445" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#fbbf24">Web3</text>
      <rect x="468" y="152" width="48" height="16" rx="3" fill="#1a1a2e"/>
      <text x="492" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#6366f1">Solidity</text>
      <rect x="520" y="152" width="42" height="16" rx="3" fill="#1a1a2e"/>
      <text x="541" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#f97066">AI/ML</text>
    </g>

    <!-- Card 4: DocAI -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.9s" fill="freeze"/>
      <rect x="604" y="60" width="170" height="180" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <rect x="604" y="60" width="170" height="2.5" rx="1" fill="#22c55e"/>
      <circle cx="753" cy="80" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
      <text x="618" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#22c55e">HEALTHCARE</text>
      <text x="618" y="106" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">DocAI</text>
      <text x="618" y="124" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">AI multilingual health</text>
      <text x="618" y="138" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">chatbot with scheduling</text>
      <rect x="618" y="152" width="44" height="16" rx="3" fill="#1a1a2e"/>
      <text x="640" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#3776AB">Python</text>
      <rect x="666" y="152" width="40" height="16" rx="3" fill="#1a1a2e"/>
      <text x="686" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#60a5fa">React</text>
      <rect x="710" y="152" width="44" height="16" rx="3" fill="#1a1a2e"/>
      <text x="732" y="163" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" fill="#22c55e">Mongo</text>
    </g>

  </g>
</svg>

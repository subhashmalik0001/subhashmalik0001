<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 280" width="740" height="280">
  <defs>
    <linearGradient id="wBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="wBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <linearGradient id="wAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e85d4a"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="wClip"><rect width="740" height="280" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#wClip)">
    <!-- Background -->
    <rect width="740" height="280" fill="url(#wBg)" rx="12"/>
    <rect width="739" height="279" rx="12" fill="none" stroke="url(#wBorder)" stroke-width="1" x="0.5" y="0.5"/>

    <!-- Accent stripe left -->
    <rect x="0" y="0" width="3" height="280" fill="url(#wAccent)"/>

    <!-- Decorative dots -->
    <circle cx="700" cy="30" r="40" fill="#7c3aed" opacity="0.03"/>
    <circle cx="710" cy="250" r="30" fill="#e85d4a" opacity="0.03"/>

    <!-- Header -->
    <text x="28" y="38" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">ABOUT</text>
    <rect x="28" y="48" width="30" height="1.5" rx="0.75" fill="#e85d4a" opacity="0.6"/>

    <!-- Name row -->
    <text x="28" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#52525b" opacity="0">
      Name<animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.3s" fill="freeze"/>
    </text>
    <text x="130" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#e4e4e7" opacity="0">
      Subhash Malik<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
    </text>

    <!-- Role row -->
    <text x="28" y="112" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#52525b" opacity="0">
      Role<animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.6s" fill="freeze"/>
    </text>
    <text x="130" y="112" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#a78bfa" opacity="0">
      Full-Stack Developer · Startup Founder · Operations Lead<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
    </text>

    <!-- Education row -->
    <text x="28" y="142" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#52525b" opacity="0">
      Education<animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.9s" fill="freeze"/>
    </text>
    <text x="130" y="142" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8" opacity="0">
      B.E. Computer Science — Chandigarh University (2024-28)<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- Focus row -->
    <text x="28" y="172" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#52525b" opacity="0">
      Focus<animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.2s" fill="freeze"/>
    </text>
    <text x="130" y="172" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#22c55e" opacity="0">
      Web Dev · AI/ML · Program Management · Community<animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
    </text>

    <!-- Building row -->
    <text x="28" y="202" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#52525b" opacity="0">
      Building<animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.5s" fill="freeze"/>
    </text>
    <text x="130" y="202" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8" opacity="0">
      Scalable platforms · Startup ecosystems · Dev communities<animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
    </text>

    <!-- Divider -->
    <line x1="28" y1="222" x2="712" y2="222" stroke="#1e1e30" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.8s" fill="freeze"/>
    </line>

    <!-- Bottom tags -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.0s" fill="freeze"/>
      <rect x="28" y="238" width="60" height="22" rx="4" fill="#1a1a2e"/>
      <text x="58" y="253" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#e85d4a">Founder</text>

      <rect x="98" y="238" width="85" height="22" rx="4" fill="#1a1a2e"/>
      <text x="140" y="253" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#a78bfa">India Lead</text>

      <rect x="193" y="238" width="110" height="22" rx="4" fill="#1a1a2e"/>
      <text x="248" y="253" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#22c55e">Open Source</text>

      <rect x="313" y="238" width="100" height="22" rx="4" fill="#1a1a2e"/>
      <text x="363" y="253" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#f59e0b">Hackathons</text>

      <rect x="423" y="238" width="80" height="22" rx="4" fill="#1a1a2e"/>
      <text x="463" y="253" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#6366f1">Speaker</text>
    </g>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="projBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="projBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="projShimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-800;900;-800" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-400;1300;-400" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="projClip"><rect width="800" height="300" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#projClip)">
    <rect width="800" height="300" fill="url(#projBg)" rx="10"/>

    <!-- Title bar -->
    <rect width="800" height="36" fill="url(#projBar)"/>
    <rect width="800" height="36" fill="url(#projShimmer)"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="400" y="23" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" fill="#8b949e">subhash@github — projects.sh</text>

    <!-- Border -->
    <rect width="799" height="299" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Prompt -->
    <text x="20" y="60" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540">$</text>
    <text x="34" y="60" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e"> ls ~/projects --featured</text>

    <!-- ═══ Project Cards ═══ -->

    <!-- Card 1: Thrift Store -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
      <rect x="20" y="78" width="185" height="180" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
      <rect x="20" y="78" width="185" height="4" rx="2" fill="#ff5540"/>
      <!-- Folder icon -->
      <g transform="translate(60, 105)">
        <path d="M0,0 L8,-6 L20,-6 L22,-4 L40,-4 L40,16 L0,16 Z" fill="none" stroke="#ff5540" stroke-width="1.5"/>
        <line x1="0" y1="4" x2="40" y2="4" stroke="#ff5540" stroke-width="1" opacity="0.4"/>
      </g>
      <text x="112" y="115" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" font-weight="bold" fill="#ff5540">Thrift Store</text>
      <text x="112" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">E-Commerce Startup</text>
      <text x="112" y="150" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Sustainable Fashion</text>
      <!-- Tech tags -->
      <rect x="30" y="162" width="45" height="16" rx="4" fill="#21262d"/>
      <text x="52" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#ff5540">MERN</text>
      <rect x="80" y="162" width="55" height="16" rx="4" fill="#21262d"/>
      <text x="107" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#e3b341">Firebase</text>
      <rect x="140" y="162" width="55" height="16" rx="4" fill="#21262d"/>
      <text x="167" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#3fb950">Stripe</text>
      <!-- Status dot -->
      <circle cx="35" cy="245" r="4" fill="#3fb950">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="45" y="248" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Live</text>
    </g>

    <!-- Card 2: AI EdTech -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.8s" fill="freeze"/>
      <rect x="215" y="78" width="185" height="180" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
      <rect x="215" y="78" width="185" height="4" rx="2" fill="#58a6ff"/>
      <g transform="translate(255, 105)">
        <path d="M0,0 L8,-6 L20,-6 L22,-4 L40,-4 L40,16 L0,16 Z" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
        <line x1="0" y1="4" x2="40" y2="4" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
      </g>
      <text x="307" y="115" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" font-weight="bold" fill="#58a6ff">AI EdTech</text>
      <text x="307" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">AI-Powered Learning</text>
      <text x="307" y="150" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Adaptive Paths</text>
      <rect x="225" y="162" width="45" height="16" rx="4" fill="#21262d"/>
      <text x="247" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#61DAFB">React</text>
      <rect x="275" y="162" width="45" height="16" rx="4" fill="#21262d"/>
      <text x="297" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#339933">Node</text>
      <rect x="325" y="162" width="60" height="16" rx="4" fill="#21262d"/>
      <text x="355" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#bc8cff">Gemini</text>
      <circle cx="230" cy="245" r="4" fill="#3fb950">
        <animate attributeName="opacity" values="1;0.4;1" dur="2.3s" repeatCount="indefinite"/>
      </circle>
      <text x="240" y="248" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Live</text>
    </g>

    <!-- Card 3: AI Agent DApp -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
      <rect x="410" y="78" width="185" height="180" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
      <rect x="410" y="78" width="185" height="4" rx="2" fill="#bc8cff"/>
      <g transform="translate(450, 105)">
        <path d="M0,0 L8,-6 L20,-6 L22,-4 L40,-4 L40,16 L0,16 Z" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
        <line x1="0" y1="4" x2="40" y2="4" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
      </g>
      <text x="502" y="115" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" font-weight="bold" fill="#bc8cff">AI DApp Agent</text>
      <text x="502" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">AI-Powered DeFi</text>
      <text x="502" y="150" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Smart Contracts</text>
      <rect x="420" y="162" width="40" height="16" rx="4" fill="#21262d"/>
      <text x="440" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#e3b341">Web3</text>
      <rect x="465" y="162" width="55" height="16" rx="4" fill="#21262d"/>
      <text x="492" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#58a6ff">Solidity</text>
      <rect x="525" y="162" width="55" height="16" rx="4" fill="#21262d"/>
      <text x="552" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#ff5540">AI/ML</text>
      <circle cx="425" cy="245" r="4" fill="#e3b341">
        <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <text x="435" y="248" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">WIP</text>
    </g>

    <!-- Card 4: DocAI -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
      <rect x="605" y="78" width="175" height="180" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
      <rect x="605" y="78" width="175" height="4" rx="2" fill="#3fb950"/>
      <g transform="translate(640, 105)">
        <path d="M0,0 L8,-6 L20,-6 L22,-4 L40,-4 L40,16 L0,16 Z" fill="none" stroke="#3fb950" stroke-width="1.5"/>
        <line x1="0" y1="4" x2="40" y2="4" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
      </g>
      <text x="692" y="115" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" font-weight="bold" fill="#3fb950">DocAI</text>
      <text x="692" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">AI Healthcare</text>
      <text x="692" y="150" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Multilingual Chatbot</text>
      <rect x="615" y="162" width="50" height="16" rx="4" fill="#21262d"/>
      <text x="640" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#3776AB">Python</text>
      <rect x="670" y="162" width="45" height="16" rx="4" fill="#21262d"/>
      <text x="692" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#61DAFB">React</text>
      <rect x="720" y="162" width="50" height="16" rx="4" fill="#21262d"/>
      <text x="745" y="173" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#339933">Mongo</text>
      <circle cx="620" cy="245" r="4" fill="#3fb950">
        <animate attributeName="opacity" values="1;0.4;1" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <text x="630" y="248" font-family="'Fira Code',monospace" font-size="9" fill="#8b949e">Live</text>
    </g>

    <!-- Status bar -->
    <rect x="0" y="282" width="800" height="18" fill="#161b22"/>
    <text x="20" y="294" font-family="'Fira Code',monospace" font-size="10" fill="#3fb950">● main</text>
    <text x="630" y="294" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">4 projects loaded</text>
  </g>
</svg>

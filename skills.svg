<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" width="700" height="310">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-700;800;-700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-300;1200;-300" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bCpp"   x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff5540"/><stop offset="100%" stop-color="#ff8c00"/></linearGradient>
    <linearGradient id="bPy"    x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3776AB"/><stop offset="100%" stop-color="#58a6ff"/></linearGradient>
    <linearGradient id="bJs"    x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e3b341"/><stop offset="100%" stop-color="#ffd700"/></linearGradient>
    <linearGradient id="bReact" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#61DAFB"/><stop offset="100%" stop-color="#00bcd4"/></linearGradient>
    <linearGradient id="bNode"  x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#339933"/><stop offset="100%" stop-color="#3fb950"/></linearGradient>
    <linearGradient id="bAI"    x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#bc8cff"/><stop offset="100%" stop-color="#8A2BE2"/></linearGradient>
    <clipPath id="c"><rect width="700" height="310" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <rect width="700" height="310" fill="url(#bg)" rx="10"/>

    <!-- Title bar -->
    <rect width="700" height="36" fill="url(#titleBar)"/>
    <rect width="700" height="36" fill="url(#shimmer)"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="350" y="23" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" fill="#8b949e">subhash@github — skills.sh</text>

    <!-- Border -->
    <rect width="699" height="309" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Prompt -->
    <text x="20" y="62" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540">$</text>
    <text x="34" y="62" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e"> ./skill-proficiency</text>

    <!-- Python -->
    <text x="20"  y="88" font-family="'Fira Code',monospace" font-size="12" fill="#c9d1d9" opacity="0">Python<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.3s" fill="freeze"/></text>
    <text x="660" y="88" text-anchor="end" font-family="'Fira Code',monospace" font-size="12" fill="#ff5540" opacity="0">90%<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.3s" fill="freeze"/></text>
    <rect x="20" y="93" width="640" height="9" rx="4" fill="#21262d"/>
    <rect x="20" y="93" width="0" height="9" rx="4" fill="url(#bCpp)"><animate attributeName="width" values="0;576" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></rect>

    <!-- TS / JS -->
    <text x="20"  y="124" font-family="'Fira Code',monospace" font-size="12" fill="#c9d1d9" opacity="0">TS / JS<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.6s" fill="freeze"/></text>
    <text x="660" y="124" text-anchor="end" font-family="'Fira Code',monospace" font-size="12" fill="#58a6ff" opacity="0">85%<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.6s" fill="freeze"/></text>
    <rect x="20" y="129" width="640" height="9" rx="4" fill="#21262d"/>
    <rect x="20" y="129" width="0" height="9" rx="4" fill="url(#bPy)"><animate attributeName="width" values="0;544" dur="1s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></rect>

    <!-- React / Next.js -->
    <text x="20"  y="160" font-family="'Fira Code',monospace" font-size="12" fill="#c9d1d9" opacity="0">React / Next.js<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/></text>
    <text x="660" y="160" text-anchor="end" font-family="'Fira Code',monospace" font-size="12" fill="#e3b341" opacity="0">80%<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/></text>
    <rect x="20" y="165" width="640" height="9" rx="4" fill="#21262d"/>
    <rect x="20" y="165" width="0" height="9" rx="4" fill="url(#bJs)"><animate attributeName="width" values="0;512" dur="1s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></rect>

    <!-- Node.js / Express -->
    <text x="20"  y="196" font-family="'Fira Code',monospace" font-size="12" fill="#c9d1d9" opacity="0">Node.js / Express<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.2s" fill="freeze"/></text>
    <text x="660" y="196" text-anchor="end" font-family="'Fira Code',monospace" font-size="12" fill="#61DAFB" opacity="0">78%<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.2s" fill="freeze"/></text>
    <rect x="20" y="201" width="640" height="9" rx="4" fill="#21262d"/>
    <rect x="20" y="201" width="0" height="9" rx="4" fill="url(#bReact)"><animate attributeName="width" values="0;499" dur="1s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></rect>

    <!-- AI / ML -->
    <text x="20"  y="232" font-family="'Fira Code',monospace" font-size="12" fill="#c9d1d9" opacity="0">AI / ML<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/></text>
    <text x="660" y="232" text-anchor="end" font-family="'Fira Code',monospace" font-size="12" fill="#3fb950" opacity="0">75%<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/></text>
    <rect x="20" y="237" width="640" height="9" rx="4" fill="#21262d"/>
    <rect x="20" y="237" width="0" height="9" rx="4" fill="url(#bNode)"><animate attributeName="width" values="0;480" dur="1s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></rect>

    <!-- Databases (SQL/NoSQL) -->
    <text x="20"  y="268" font-family="'Fira Code',monospace" font-size="12" fill="#c9d1d9" opacity="0">Databases (SQL/NoSQL)<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.8s" fill="freeze"/></text>
    <text x="660" y="268" text-anchor="end" font-family="'Fira Code',monospace" font-size="12" fill="#bc8cff" opacity="0">70%<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.8s" fill="freeze"/></text>
    <rect x="20" y="273" width="640" height="9" rx="4" fill="#21262d"/>
    <rect x="20" y="273" width="0" height="9" rx="4" fill="url(#bAI)"><animate attributeName="width" values="0;448" dur="1s" begin="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/></rect>

    <!-- Status bar -->
    <rect x="0" y="292" width="700" height="18" fill="#161b22"/>
    <text x="20" y="304" font-family="'Fira Code',monospace" font-size="10" fill="#3fb950">● main</text>
    <text x="580" y="304" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">6 languages</text>
  </g>
</svg>

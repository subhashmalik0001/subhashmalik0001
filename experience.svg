<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="eBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="eBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <linearGradient id="eLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e85d4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.3"/>
    </linearGradient>
    <clipPath id="eClip"><rect width="800" height="480" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#eClip)">
    <rect width="800" height="480" fill="url(#eBg)" rx="12"/>
    <rect width="799" height="479" rx="12" fill="none" stroke="url(#eBorder)" stroke-width="1" x="0.5" y="0.5"/>
    <rect x="0" y="0" width="3" height="480" fill="url(#eLine)"/>

    <!-- Subtle background accents -->
    <circle cx="750" cy="60" r="80" fill="#7c3aed" opacity="0.02"/>
    <circle cx="50" cy="420" r="60" fill="#e85d4a" opacity="0.02"/>

    <!-- Header -->
    <text x="28" y="36" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">EXPERIENCE</text>
    <rect x="28" y="46" width="30" height="1.5" rx="0.75" fill="#e85d4a" opacity="0.6"/>

    <!-- Timeline line -->
    <rect x="44" y="65" width="1.5" height="395" rx="0.75" fill="url(#eLine)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
    </rect>

    <!-- Entry 1: CU-TBI -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
      <!-- Dot -->
      <circle cx="45" cy="85" r="5" fill="#0a0a12" stroke="#e85d4a" stroke-width="2"/>
      <circle cx="45" cy="85" r="2" fill="#e85d4a"/>
      <!-- Content -->
      <text x="65" y="82" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#e85d4a">MAY 2025 — PRESENT</text>
      <text x="65" y="102" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="15" font-weight="700" fill="#e4e4e7">CU-TBI · Chandigarh University</text>
      <text x="65" y="120" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#a78bfa">Web Developer &amp; Growth Operations Executive</text>
      <text x="65" y="140" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Developed 10+ full-stack websites for startups</text>
      <text x="65" y="157" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Co-launched Campus Tank with Venture Catalysts++ &amp; apna</text>
    </g>

    <!-- Entry 2: Thrift Store -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.8s" fill="freeze"/>
      <circle cx="45" cy="195" r="5" fill="#0a0a12" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="45" cy="195" r="2" fill="#a78bfa"/>
      <text x="65" y="192" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#a78bfa">APR 2025 — PRESENT</text>
      <text x="65" y="212" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="15" font-weight="700" fill="#e4e4e7">Thrift Store · Founder &amp; CEO</text>
      <text x="65" y="230" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#22c55e">Sustainable Fashion E-Commerce Startup</text>
      <text x="65" y="250" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Built platform with MERN Stack, Firebase &amp; Stripe API</text>
      <text x="65" y="267" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Scaled operations through digital marketing strategies</text>
    </g>

    <!-- Entry 3: DevNovate -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
      <circle cx="45" cy="305" r="5" fill="#0a0a12" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="45" cy="305" r="2" fill="#f59e0b"/>
      <text x="65" y="302" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#f59e0b">DEC 2024 — MAY 2025</text>
      <text x="65" y="322" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="15" font-weight="700" fill="#e4e4e7">DevNovate Technologies</text>
      <text x="65" y="340" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#60a5fa">Engineering &amp; Product Operation Manager</text>
      <text x="65" y="360" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Scaled event platform to 500K+ users across 100+ events</text>
      <text x="65" y="377" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Increased active user base by 45%</text>
    </g>

    <!-- Entry 4: Kalp Studio -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
      <circle cx="45" cy="415" r="5" fill="#0a0a12" stroke="#6366f1" stroke-width="2"/>
      <circle cx="45" cy="415" r="2" fill="#6366f1"/>
      <text x="65" y="412" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="1" fill="#6366f1">APR 2024 — OCT 2024</text>
      <text x="65" y="432" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="15" font-weight="700" fill="#e4e4e7">Kalp Studio · Blockchain</text>
      <text x="65" y="450" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#fb7185">Ecosystem &amp; Community Intern</text>
      <text x="65" y="470" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#71717a">→ Enhanced blockchain adoption &amp; organized Web3 events</text>
    </g>

  </g>
</svg>

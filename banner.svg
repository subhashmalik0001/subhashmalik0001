<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Rich dark gradient background -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06060a"/>
      <stop offset="35%"  stop-color="#0c0c18"/>
      <stop offset="65%"  stop-color="#110a20"/>
      <stop offset="100%" stop-color="#08060e"/>
    </linearGradient>

    <!-- Subtle ambient light -->
    <radialGradient id="ambientLeft" cx="15%" cy="40%" r="35%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientRight" cx="85%" cy="60%" r="30%">
      <stop offset="0%"   stop-color="#e85d4a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientCenter" cx="50%" cy="55%" r="25%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Name gradient — warm ember -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f97066"/>
      <stop offset="50%"  stop-color="#e85d4a"/>
      <stop offset="100%" stop-color="#dc4535"/>
    </linearGradient>

    <!-- Shimmer -->
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-600;1400;-600" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-200;1800;-200" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="nameClip">
      <text x="600" y="235" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue','Arial Black',sans-serif"
        font-size="180" font-weight="900" letter-spacing="-8">Subhash</text>
    </clipPath>

    <filter id="nameShadow" x="-4%" y="-10%" width="108%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#e85d4a" flood-opacity="0.25"/>
    </filter>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>

    <clipPath id="clip"><rect width="1200" height="400"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Background layers -->
    <rect width="1200" height="400" fill="url(#sky)"/>
    <rect width="1200" height="400" fill="url(#ambientLeft)"/>
    <rect width="1200" height="400" fill="url(#ambientRight)"/>
    <rect width="1200" height="400" fill="url(#ambientCenter)"/>
    <rect width="1200" height="400" fill="url(#grid)"/>

    <!-- Noise overlay for texture -->
    <rect width="1200" height="400" filter="url(#noise)" opacity="0.02"/>

    <!-- Floating particles — subtle dots -->
    <g fill="#ffffff">
      <circle cx="150" cy="80" r="1" opacity="0.15"><animate attributeName="cy" values="80;70;80" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="120" r="0.8" opacity="0.12"><animate attributeName="cy" values="120;108;120" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="60" r="1.2" opacity="0.18"><animate attributeName="cy" values="60;48;60" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="100" r="0.7" opacity="0.10"><animate attributeName="cy" values="100;90;100" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="880" cy="70" r="1" opacity="0.14"><animate attributeName="cy" values="70;58;70" dur="9s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="90" r="0.9" opacity="0.12"><animate attributeName="cy" values="90;80;90" dur="6.5s" repeatCount="indefinite"/></circle>
      <circle cx="230" cy="300" r="0.6" opacity="0.08"><animate attributeName="cy" values="300;290;300" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="950" cy="310" r="0.8" opacity="0.10"><animate attributeName="cy" values="310;298;310" dur="8s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Decorative line — top left -->
    <line x1="40" y1="0" x2="40" y2="400" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#7c3aed" stroke-width="0.3" opacity="0.06"/>

    <!-- Decorative line — bottom right -->
    <line x1="1120" y1="0" x2="1120" y2="400" stroke="#e85d4a" stroke-width="0.5" opacity="0.10"/>
    <line x1="1160" y1="0" x2="1160" y2="400" stroke="#e85d4a" stroke-width="0.3" opacity="0.05"/>

    <!-- Horizontal accent line -->
    <rect x="0" y="320" width="1200" height="0.5" fill="#ffffff" opacity="0.04"/>

    <!-- MAIN NAME — shadow layer -->
    <text x="600" y="235" text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue','Arial Black',sans-serif"
      font-size="180" font-weight="900" letter-spacing="-8"
      fill="#000000" opacity="0.3">Subhash</text>

    <!-- MAIN NAME — primary -->
    <text x="600" y="235" text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue','Arial Black',sans-serif"
      font-size="180" font-weight="900" letter-spacing="-8"
      fill="url(#nameGrad)" filter="url(#nameShadow)" opacity="0">
      Subhash
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.3s" fill="freeze"/>
    </text>

    <!-- Shimmer on text -->
    <rect x="0" y="60" width="1200" height="220"
      fill="url(#shimmer)" clip-path="url(#nameClip)"/>

    <!-- Subtitle -->
    <text x="600" y="290" text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
      font-size="15" font-weight="400" letter-spacing="6"
      fill="#a1a1aa" opacity="0">
      SOFTWARE ENGINEER  ·  STARTUP FOUNDER  ·  TECH LEADER
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.8s" fill="freeze"/>
    </text>

    <!-- Bottom accent bar -->
    <rect x="480" y="310" width="240" height="2" rx="1" fill="#e85d4a" opacity="0">
      <animate attributeName="opacity" values="0;0.6" dur="0.8s" begin="1.2s" fill="freeze"/>
    </rect>

    <!-- Location tag -->
    <text x="600" y="345" text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
      font-size="12" font-weight="300" letter-spacing="3"
      fill="#52525b" opacity="0">
      CHANDIGARH, INDIA
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.5s" fill="freeze"/>
    </text>

    <!-- Side label -->
    <text x="22" y="210" text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
      font-size="9" font-weight="300" letter-spacing="4"
      fill="#ffffff" opacity="0.15"
      transform="rotate(-90,22,210)">DEVELOPER</text>

  </g>
</svg>

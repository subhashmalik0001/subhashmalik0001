<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <!-- shimmer on title bar -->
    <linearGradient id="barShimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-700;800;-700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-300;1200;-300" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="termClip"><rect width="700" height="260" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#termClip)">

    <!-- Window background -->
    <rect width="700" height="260" fill="url(#termBg)" rx="10"/>

    <!-- Title bar -->
    <rect width="700" height="36" fill="url(#titleBar)"/>
    <rect width="700" height="36" fill="url(#barShimmer)"/>

    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>

    <!-- Title -->
    <text x="350" y="23" text-anchor="middle"
      font-family="'Fira Code',monospace" font-size="12" fill="#8b949e">
      subhash@github — focus.sh
    </text>

    <!-- Border -->
    <rect width="699" height="259" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Prompt line 1 -->
    <text x="20" y="65" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540">$</text>
    <text x="34" y="65" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e"> cat goals.txt</text>

    <!-- Line 1 — appears at 0.5s -->
    <text x="20" y="90" font-family="'Fira Code',monospace" font-size="13" fill="#39d353" opacity="0">
      🔭  Building Startups &amp; Full-Stack platforms
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
    </text>

    <!-- Line 2 — appears at 1.2s -->
    <text x="20" y="112" font-family="'Fira Code',monospace" font-size="13" fill="#58a6ff" opacity="0">
      🌱  Mastering Next.js · Python · AI Agents
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.2s" fill="freeze"/>
    </text>

    <!-- Line 3 — appears at 1.9s -->
    <text x="20" y="134" font-family="'Fira Code',monospace" font-size="13" fill="#e3b341" opacity="0">
      💡  Managing Dev Communities &amp; Operations
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
    </text>

    <!-- Line 4 — appears at 2.6s -->
    <text x="20" y="156" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      🚀  Building Innovative Tech &amp; Startups
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.6s" fill="freeze"/>
    </text>

    <!-- Line 5 — appears at 3.3s -->
    <text x="20" y="178" font-family="'Fira Code',monospace" font-size="13" fill="#bc8cff" opacity="0">
      ⚡  Code, Build, Innovate!
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.3s" fill="freeze"/>
    </text>

    <!-- Divider -->
    <line x1="20" y1="198" x2="680" y2="198" stroke="#21262d" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.5s" fill="freeze"/>
    </line>

    <!-- Next prompt with blinking cursor -->
    <text x="20" y="222" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      $
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.6s" fill="freeze"/>
    </text>
    <text x="34" y="222" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      █
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.6s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="3.7s" repeatCount="indefinite"/>
    </text>

    <!-- Status bar at bottom -->
    <rect x="0" y="242" width="700" height="18" fill="#161b22"/>
    <text x="20" y="254" font-family="'Fira Code',monospace" font-size="10" fill="#3fb950">● main</text>
    <text x="560" y="254" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">Chandigarh, India 🇮🇳</text>

  </g>
</svg>

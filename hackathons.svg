<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <linearGradient id="hackBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hackBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="hackShimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-800;900;-800" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-400;1300;-400" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="speakerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hackClip"><rect width="800" height="340" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#hackClip)">
    <rect width="800" height="340" fill="url(#hackBg)" rx="10"/>

    <!-- Title bar -->
    <rect width="800" height="36" fill="url(#hackBar)"/>
    <rect width="800" height="36" fill="url(#hackShimmer)"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="400" y="23" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" fill="#8b949e">subhash@github — trophies.sh</text>

    <!-- Border -->
    <rect width="799" height="339" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Prompt -->
    <text x="20" y="60" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540">$</text>
    <text x="34" y="60" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e"> ./display-achievements --format=trophies</text>

    <!-- ═══ Trophy 1: NIT Hack 5.0 — Grand Prize ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>

      <!-- Card background -->
      <rect x="20" y="78" width="240" height="210" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>

      <!-- Gold trophy icon -->
      <g transform="translate(140, 115)" filter="url(#trophyGlow)">
        <!-- Trophy cup -->
        <path d="M-15,-20 L15,-20 L12,0 Q10,10 0,12 Q-10,10 -12,0 Z" fill="url(#goldGrad)"/>
        <!-- Trophy handles -->
        <path d="M-15,-15 Q-25,-10 -20,0 Q-15,5 -12,0" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
        <path d="M15,-15 Q25,-10 20,0 Q15,5 12,0" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
        <!-- Base -->
        <rect x="-4" y="12" width="8" height="8" fill="url(#goldGrad)"/>
        <rect x="-10" y="20" width="20" height="4" rx="2" fill="url(#goldGrad)"/>
        <!-- Star -->
        <text x="0" y="-5" text-anchor="middle" font-size="12" fill="#0d1117">★</text>
        <!-- Pulse ring -->
        <circle cx="0" cy="0" r="25" fill="none" stroke="#ffd700" stroke-width="1" opacity="0">
          <animate attributeName="r" values="25;40;25" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Text -->
      <text x="140" y="160" text-anchor="middle" font-family="'Fira Code',monospace" font-size="14" font-weight="bold" fill="#ffd700">1st PLACE</text>
      <text x="140" y="178" text-anchor="middle" font-family="'Fira Code',monospace" font-size="11" fill="#c9d1d9">NIT Hack 5.0</text>
      <text x="140" y="195" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">Grand Prize · 100+ teams</text>
      <text x="140" y="212" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#58a6ff">CT University x IBM</text>

      <!-- Sparkle particles -->
      <circle cx="85" cy="100" r="1.5" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="195" cy="95" r="1" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="130" r="1.2" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="125" r="1" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ═══ Trophy 2: Google Hackathon — 1st Runner-Up ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.0s" fill="freeze"/>

      <rect x="280" y="78" width="240" height="210" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>

      <!-- Silver trophy icon -->
      <g transform="translate(400, 115)" filter="url(#trophyGlow)">
        <path d="M-15,-20 L15,-20 L12,0 Q10,10 0,12 Q-10,10 -12,0 Z" fill="url(#silverGrad)"/>
        <path d="M-15,-15 Q-25,-10 -20,0 Q-15,5 -12,0" fill="none" stroke="url(#silverGrad)" stroke-width="2.5"/>
        <path d="M15,-15 Q25,-10 20,0 Q15,5 12,0" fill="none" stroke="url(#silverGrad)" stroke-width="2.5"/>
        <rect x="-4" y="12" width="8" height="8" fill="url(#silverGrad)"/>
        <rect x="-10" y="20" width="20" height="4" rx="2" fill="url(#silverGrad)"/>
        <text x="0" y="-5" text-anchor="middle" font-size="12" fill="#0d1117">★</text>
        <circle cx="0" cy="0" r="25" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0">
          <animate attributeName="r" values="25;38;25" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.25;0" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <text x="400" y="160" text-anchor="middle" font-family="'Fira Code',monospace" font-size="14" font-weight="bold" fill="#e8e8e8">1st RUNNER-UP</text>
      <text x="400" y="178" text-anchor="middle" font-family="'Fira Code',monospace" font-size="11" fill="#c9d1d9">Google Hackathon</text>
      <text x="400" y="195" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">July 2025</text>
      <text x="400" y="212" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#58a6ff">Google India</text>

      <circle cx="345" cy="100" r="1.2" fill="#c0c0c0" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="1.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="455" cy="95" r="1" fill="#c0c0c0" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ═══ Trophy 3: Speaker & Judge ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>

      <rect x="540" y="78" width="240" height="210" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>

      <!-- Mic / Speaker icon -->
      <g transform="translate(660, 115)" filter="url(#trophyGlow)">
        <!-- Microphone shape -->
        <rect x="-6" y="-22" width="12" height="24" rx="6" fill="url(#speakerGrad)"/>
        <!-- Stand -->
        <line x1="0" y1="2" x2="0" y2="16" stroke="url(#speakerGrad)" stroke-width="2.5"/>
        <line x1="-8" y1="16" x2="8" y2="16" stroke="url(#speakerGrad)" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Curved holder -->
        <path d="M-10,-5 Q-14,8 0,10 Q14,8 10,-5" fill="none" stroke="url(#speakerGrad)" stroke-width="2"/>
        <!-- Base -->
        <rect x="-10" y="20" width="20" height="4" rx="2" fill="url(#speakerGrad)"/>
        <!-- Sound waves -->
        <path d="M14,-15 Q22,-8 14,0" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0">
          <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" repeatCount="indefinite"/>
        </path>
        <path d="M18,-18 Q28,-8 18,3" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
        </path>
      </g>

      <text x="660" y="160" text-anchor="middle" font-family="'Fira Code',monospace" font-size="14" font-weight="bold" fill="#58a6ff">SPEAKER &amp; JUDGE</text>
      <text x="660" y="178" text-anchor="middle" font-family="'Fira Code',monospace" font-size="11" fill="#c9d1d9">BuildVerse Hackathon</text>
      <text x="660" y="195" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">Scaler School of Technology</text>
      <text x="660" y="212" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#58a6ff">Microsoft Noida · Local Host</text>
    </g>

    <!-- Status bar -->
    <rect x="0" y="322" width="800" height="18" fill="#161b22"/>
    <text x="20" y="334" font-family="'Fira Code',monospace" font-size="10" fill="#3fb950">● main</text>
    <text x="610" y="334" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">3 achievements loaded</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="hBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="hBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="silverAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <clipPath id="hClip"><rect width="800" height="260" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#hClip)">
    <rect width="800" height="260" fill="url(#hBg)" rx="12"/>
    <rect width="799" height="259" rx="12" fill="none" stroke="url(#hBorder)" stroke-width="1" x="0.5" y="0.5"/>
    <rect x="0" y="0" width="3" height="260" fill="url(#goldAccent)"/>

    <!-- Header -->
    <text x="28" y="36" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">ACHIEVEMENTS</text>
    <rect x="28" y="46" width="30" height="1.5" rx="0.75" fill="#fbbf24" opacity="0.6"/>

    <!-- Trophy 1: NIT Hack -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
      <rect x="28" y="62" width="235" height="175" rx="10" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <!-- Gold badge -->
      <rect x="28" y="62" width="235" height="3" rx="1.5" fill="url(#goldAccent)"/>
      <!-- Medal circle -->
      <circle cx="145" cy="110" r="22" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
      <circle cx="145" cy="110" r="15" fill="none" stroke="#fbbf24" stroke-width="1"/>
      <text x="145" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="16" font-weight="800" fill="#fbbf24">1st</text>
      <!-- Pulse -->
      <circle cx="145" cy="110" r="22" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0">
        <animate attributeName="r" values="22;30;22" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.15;0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- Text -->
      <text x="145" y="155" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#fbbf24">GRAND PRIZE</text>
      <text x="145" y="175" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#d4d4d8">NIT Hack 5.0</text>
      <text x="145" y="192" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">CT University × IBM</text>
      <text x="145" y="208" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#52525b">100+ teams · May 2025</text>
      <!-- Sparkles -->
      <circle cx="60" cy="85" r="1" fill="#fbbf24" opacity="0"><animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="230" cy="90" r="0.8" fill="#fbbf24" opacity="0"><animate attributeName="opacity" values="0;0.5;0" dur="2.5s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="75" cy="130" r="0.8" fill="#fbbf24" opacity="0"><animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="0.8s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Trophy 2: Google Hackathon -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
      <rect x="283" y="62" width="235" height="175" rx="10" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <rect x="283" y="62" width="235" height="3" rx="1.5" fill="url(#silverAccent)"/>
      <circle cx="400" cy="110" r="22" fill="none" stroke="#a1a1aa" stroke-width="1.5" opacity="0.3"/>
      <circle cx="400" cy="110" r="15" fill="none" stroke="#a1a1aa" stroke-width="1"/>
      <text x="400" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="16" font-weight="800" fill="#d4d4d8">2nd</text>
      <circle cx="400" cy="110" r="22" fill="none" stroke="#a1a1aa" stroke-width="0.5" opacity="0">
        <animate attributeName="r" values="22;28;22" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.12;0" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <text x="400" y="155" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#d4d4d8">1st RUNNER-UP</text>
      <text x="400" y="175" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#d4d4d8">Google Hackathon</text>
      <text x="400" y="192" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Google India</text>
      <text x="400" y="208" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#52525b">July 2025</text>
    </g>

    <!-- Trophy 3: Speaker & Judge -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>
      <rect x="538" y="62" width="235" height="175" rx="10" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <rect x="538" y="62" width="235" height="3" rx="1.5" fill="url(#blueAccent)"/>
      <circle cx="655" cy="110" r="22" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
      <circle cx="655" cy="110" r="15" fill="none" stroke="#6366f1" stroke-width="1"/>
      <text x="655" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" fill="#60a5fa">🎤</text>
      <!-- Sound wave animation -->
      <path d="M680,100 Q688,105 680,110" fill="none" stroke="#6366f1" stroke-width="1" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M685,96 Q695,105 685,114" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0">
        <animate attributeName="opacity" values="0;0.3;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <text x="655" y="155" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#60a5fa">SPEAKER &amp; JUDGE</text>
      <text x="655" y="175" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#d4d4d8">BuildVerse Hackathon</text>
      <text x="655" y="192" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Scaler · Microsoft Noida</text>
      <text x="655" y="208" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#52525b">Speaker &amp; Local Host</text>
    </g>

  </g>
</svg>

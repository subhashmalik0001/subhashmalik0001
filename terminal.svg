<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 230" width="740" height="230">
  <defs>
    <linearGradient id="tBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="tBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <linearGradient id="tAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <clipPath id="tClip"><rect width="740" height="230" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#tClip)">
    <rect width="740" height="230" fill="url(#tBg)" rx="12"/>
    <rect width="739" height="229" rx="12" fill="none" stroke="url(#tBorder)" stroke-width="1" x="0.5" y="0.5"/>
    <rect x="0" y="0" width="3" height="230" fill="url(#tAccent)"/>

    <!-- Header -->
    <text x="28" y="36" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">CURRENT FOCUS</text>
    <rect x="28" y="46" width="30" height="1.5" rx="0.75" fill="#22c55e" opacity="0.6"/>

    <!-- Goals — with subtle left border accent per line -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
      <rect x="28" y="60" width="2" height="16" rx="1" fill="#22c55e" opacity="0.5"/>
      <text x="40" y="73" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8">Building startups &amp; full-stack platforms at scale</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
      <rect x="28" y="90" width="2" height="16" rx="1" fill="#60a5fa" opacity="0.5"/>
      <text x="40" y="103" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8">Mastering Next.js · Python · AI Agents &amp; LLMs</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      <rect x="28" y="120" width="2" height="16" rx="1" fill="#f59e0b" opacity="0.5"/>
      <text x="40" y="133" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8">Managing developer communities &amp; operations across India</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
      <rect x="28" y="150" width="2" height="16" rx="1" fill="#e85d4a" opacity="0.5"/>
      <text x="40" y="163" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8">Driving innovation through hackathons &amp; startup ecosystems</text>
    </g>

    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
      <rect x="28" y="180" width="2" height="16" rx="1" fill="#a78bfa" opacity="0.5"/>
      <text x="40" y="193" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#d4d4d8">Code, Build, Innovate — every single day</text>
    </g>

    <!-- Blinking cursor -->
    <rect x="28" y="210" width="8" height="14" rx="1" fill="#22c55e" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="1.9s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>

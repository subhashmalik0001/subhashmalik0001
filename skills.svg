<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 310" width="740" height="310">
  <defs>
    <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="sBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>

    <!-- Skill bar gradients — each unique -->
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f97066"/><stop offset="100%" stop-color="#e85d4a"/></linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="bar6" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fb7185"/><stop offset="100%" stop-color="#e11d48"/></linearGradient>

    <clipPath id="sClip"><rect width="740" height="310" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#sClip)">
    <rect width="740" height="310" fill="url(#sBg)" rx="12"/>
    <rect width="739" height="309" rx="12" fill="none" stroke="url(#sBorder)" stroke-width="1" x="0.5" y="0.5"/>

    <!-- Accent stripe -->
    <rect x="0" y="0" width="3" height="310" fill="url(#bar2)"/>

    <!-- Header -->
    <text x="28" y="36" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">SKILL PROFICIENCY</text>
    <rect x="28" y="46" width="30" height="1.5" rx="0.75" fill="#7c3aed" opacity="0.6"/>

    <!-- Python — 90% -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.2s" fill="freeze"/>
      <text x="28"  y="80" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#d4d4d8">Python</text>
      <text x="700" y="80" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#e85d4a">90%</text>
      <rect x="28" y="88" width="682" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="28" y="88" width="0" height="6" rx="3" fill="url(#bar1)">
        <animate attributeName="width" values="0;614" dur="1.2s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>

    <!-- TypeScript / JS — 85% -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.4s" fill="freeze"/>
      <text x="28"  y="120" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#d4d4d8">TypeScript / JavaScript</text>
      <text x="700" y="120" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#a78bfa">85%</text>
      <rect x="28" y="128" width="682" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="28" y="128" width="0" height="6" rx="3" fill="url(#bar2)">
        <animate attributeName="width" values="0;580" dur="1.2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>

    <!-- React / Next.js — 82% -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.6s" fill="freeze"/>
      <text x="28"  y="160" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#d4d4d8">React / Next.js</text>
      <text x="700" y="160" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#22c55e">82%</text>
      <rect x="28" y="168" width="682" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="28" y="168" width="0" height="6" rx="3" fill="url(#bar3)">
        <animate attributeName="width" values="0;559" dur="1.2s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>

    <!-- Node.js / Django — 78% -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.8s" fill="freeze"/>
      <text x="28"  y="200" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#d4d4d8">Node.js / Django / Flask</text>
      <text x="700" y="200" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#6366f1">78%</text>
      <rect x="28" y="208" width="682" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="28" y="208" width="0" height="6" rx="3" fill="url(#bar4)">
        <animate attributeName="width" values="0;532" dur="1.2s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>

    <!-- Databases — 75% -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.0s" fill="freeze"/>
      <text x="28"  y="240" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#d4d4d8">PostgreSQL / MongoDB / MySQL</text>
      <text x="700" y="240" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#f59e0b">75%</text>
      <rect x="28" y="248" width="682" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="28" y="248" width="0" height="6" rx="3" fill="url(#bar5)">
        <animate attributeName="width" values="0;512" dur="1.2s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>

    <!-- AI/ML — 65% -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.2s" fill="freeze"/>
      <text x="28"  y="280" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="12" fill="#d4d4d8">AI / ML / LLMs</text>
      <text x="700" y="280" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#e11d48">65%</text>
      <rect x="28" y="288" width="682" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="28" y="288" width="0" height="6" rx="3" fill="url(#bar6)">
        <animate attributeName="width" values="0;443" dur="1.2s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>

  </g>
</svg>

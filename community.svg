<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 165" width="800" height="165">
  <defs>
    <linearGradient id="cBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="cBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#18182a"/>
    </linearGradient>
    <clipPath id="cClip"><rect width="800" height="165" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#cClip)">
    <rect width="800" height="165" fill="url(#cBg)" rx="12"/>
    <rect width="799" height="164" rx="12" fill="none" stroke="url(#cBorder)" stroke-width="1" x="0.5" y="0.5"/>
    <rect x="0" y="0" width="3" height="165" fill="#6366f1"/>

    <!-- Header -->
    <text x="28" y="36" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#52525b">IMPACT</text>
    <rect x="28" y="46" width="30" height="1.5" rx="0.75" fill="#6366f1" opacity="0.6"/>

    <!-- Stat 1 -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
      <rect x="28" y="60" width="175" height="85" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <text x="115" y="96" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="28" font-weight="800" fill="#e85d4a">100K+</text>
      <text x="115" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Community Members</text>
      <text x="115" y="132" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="9" fill="#52525b">HackWithIndia · India Lead</text>
    </g>

    <!-- Stat 2 -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
      <rect x="218" y="60" width="175" height="85" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <text x="305" y="96" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="28" font-weight="800" fill="#22c55e">500K+</text>
      <text x="305" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Platform Users</text>
      <text x="305" y="132" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="9" fill="#52525b">DevNovate · 100+ events</text>
    </g>

    <!-- Stat 3 -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
      <rect x="408" y="60" width="175" height="85" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <text x="495" y="96" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="28" font-weight="800" fill="#a78bfa">10+</text>
      <text x="495" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Production Websites</text>
      <text x="495" y="132" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="9" fill="#52525b">Full-stack for startups</text>
    </g>

    <!-- Stat 4 -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      <rect x="598" y="60" width="175" height="85" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="0.5"/>
      <text x="685" y="96" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="28" font-weight="800" fill="#f59e0b">20K+</text>
      <text x="685" y="116" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="10" fill="#71717a">Entrepreneurs Engaged</text>
      <text x="685" y="132" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="9" fill="#52525b">Campus Tank · Hackathons</text>
    </g>

  </g>
</svg>

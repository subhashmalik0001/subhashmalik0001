<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="-60%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animate attributeName="x1" values="-700;800;-700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-300;1200;-300" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="c"><rect width="700" height="300" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <rect width="700" height="300" fill="url(#bg)" rx="10"/>

    <!-- Title bar -->
    <rect width="700" height="36" fill="url(#titleBar)"/>
    <rect width="700" height="36" fill="url(#shimmer)"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="350" y="23" text-anchor="middle" font-family="'Fira Code',monospace" font-size="12" fill="#8b949e">subhash@github — whoami</text>

    <!-- Border -->
    <rect width="699" height="299" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Prompt -->
    <text x="20" y="62" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540">$</text>
    <text x="34" y="62" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e"> whoami --verbose</text>

    <!-- Name -->
    <text x="20" y="90" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      Name<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.4s" fill="freeze"/>
    </text>
    <text x="120" y="90" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      →<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.4s" fill="freeze"/>
    </text>
    <text x="145" y="90" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9" opacity="0">
      Subhash Malik<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.4s" fill="freeze"/>
    </text>

    <!-- Role -->
    <text x="20" y="114" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      Role<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/>
    </text>
    <text x="120" y="114" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      →<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/>
    </text>
    <text x="145" y="114" font-family="'Fira Code',monospace" font-size="13" fill="#58a6ff" opacity="0">
      Full-Stack Dev | AI Enthusiast | Operations Manager<animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- Location -->
    <text x="20" y="138" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      Location<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.4s" fill="freeze"/>
    </text>
    <text x="120" y="138" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      →<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.4s" fill="freeze"/>
    </text>
    <text x="145" y="138" font-family="'Fira Code',monospace" font-size="13" fill="#3fb950" opacity="0">
      Chandigarh, India 🇮🇳<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.4s" fill="freeze"/>
    </text>

    <!-- Focus -->
    <text x="20" y="162" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      Focus<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
    </text>
    <text x="120" y="162" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      →<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
    </text>
    <text x="145" y="162" font-family="'Fira Code',monospace" font-size="13" fill="#e3b341" opacity="0">
      Web Dev · AI/ML · Full Stack · Program Management<animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
    </text>

    <!-- Motto -->
    <text x="20" y="186" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      Motto<animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="120" y="186" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      →<animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="145" y="186" font-family="'Fira Code',monospace" font-size="13" fill="#bc8cff" opacity="0">
      Consistency &gt; Motivation<animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.4s" fill="freeze"/>
    </text>

    <!-- Building -->
    <text x="20" y="210" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      Building<animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.9s" fill="freeze"/>
    </text>
    <text x="120" y="210" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      →<animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.9s" fill="freeze"/>
    </text>
    <text x="145" y="210" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9" opacity="0">
      Scalable, production-ready systems<animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.9s" fill="freeze"/>
    </text>

    <!-- Divider -->
    <line x1="20" y1="226" x2="680" y2="226" stroke="#21262d" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.1s" fill="freeze"/>
    </line>

    <!-- Next prompt + blinking cursor -->
    <text x="20" y="250" font-family="'Fira Code',monospace" font-size="13" fill="#ff5540" opacity="0">
      $<animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.2s" fill="freeze"/>
    </text>
    <text x="34" y="250" font-family="'Fira Code',monospace" font-size="13" fill="#8b949e" opacity="0">
      █
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.2s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="3.3s" repeatCount="indefinite"/>
    </text>

    <!-- Status bar -->
    <rect x="0" y="282" width="700" height="18" fill="#161b22"/>
    <text x="20"  y="294" font-family="'Fira Code',monospace" font-size="10" fill="#3fb950">● main</text>
    <text x="560" y="294" font-family="'Fira Code',monospace" font-size="10" fill="#8b949e">subhashmalik0001</text>
  </g>
</svg>
